<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>StoryTangl Wireframes v2 — print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="v2-styles.css?v=3">
<style>
  /* --- Print-friendly tweaks --- */
  html, body {
    background: var(--paper) !important;
  }
  /* Keep content contained to a printable width; don't rely on 1280px viewport */
  #root > .paper > div[style*="max-width"] {
    max-width: 1180px !important;
    margin: 0 auto !important;
    padding: 20px 24px 40px !important;
  }
  /* Hide the sticky top rail — belongs to the interactive web version */
  .rail { display: none !important; }

  /* Shells can be tall; let them breathe on screen too */
  .shell-frame { min-height: 0 !important; }
  .shell-body { overflow: visible !important; }
  .v2-scroll, .v2-dossier .dos-stage, .v2-dossier .dos-rail,
  .v2-stage, .v2-stage .stage-log, .v2-dossier { overflow: visible !important; }

  /* --- @page + @media print --- */
  @page {
    size: Letter landscape;
    margin: 0.5in;
  }
  @media print {
    html, body {
      background: #fff !important;
      color: #000 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .paper {
      background-image: none !important;
      background-color: #fff !important;
    }
    .rail { display: none !important; }

    /* Section headers start a new page, except the first */
    .section-h2 {
      break-before: page;
      page-break-before: always;
      margin-top: 0 !important;
    }
    .section-h2:first-of-type {
      break-before: avoid;
      page-break-before: avoid;
    }

    /* Keep important blocks intact */
    .matrix-wrap,
    .spec-card,
    .shell-frame,
    .callout,
    .parity-table {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* The triptych of shells is wide — stack for print so each is readable */
    .triptych {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }
    .shell-frame {
      break-inside: avoid;
      page-break-inside: avoid;
      min-height: 0 !important;
    }
    .shell-body {
      overflow: visible !important;
    }
    .v2-scroll,
    .v2-dossier .dos-stage,
    .v2-dossier .dos-rail,
    .v2-stage .stage-log {
      overflow: visible !important;
      max-height: none !important;
    }

    /* Spec cards: 2-up on print for readability */
    .spec-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }

    /* Tables */
    .matrix, .parity-table {
      font-size: 10px !important;
    }
    .matrix thead, .parity-table thead {
      display: table-header-group;
    }
    .matrix tr, .parity-table tr {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Remove sticky/backdrop effects */
    * {
      animation: none !important;
      transition: none !important;
    }

    /* Guard against oversized media placeholders pushing rows off-page */
    .v2-scroll .sc-media,
    .v2-dossier .dos-cover {
      aspect-ratio: auto !important;
      min-height: 120px;
      max-height: 180px;
    }
    .v2-stage .stage-top {
      min-height: 240px;
    }

    /* Kill outline that sometimes shows on disabled buttons */
    button { outline: none !important; }

    /* Print helper: compress huge page gaps from flex min-height */
    .shell-frame { page-break-after: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="v2-fixture.js?v=3"></script>
<script type="text/babel" src="v2-shells.jsx?v=3"></script>
<script type="text/babel" src="v2-specs.jsx?v=3"></script>
<script type="text/babel" src="v2-app.jsx?v=3"></script>

<script type="text/babel">
  // Wait for Babel to finish parsing previous JSX, React to render,
  // fonts to load, then print.
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    // give React a tick to mount
    await new Promise(r => requestAnimationFrame(r));
    await new Promise(r => setTimeout(r, 500));
    window.print();
  })();
</script>
</body>
</html>
