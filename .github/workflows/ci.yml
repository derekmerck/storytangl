name: CI

on:
  push:
    # PRs cover feature branches; keep push CI for the default branch only.
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    # pyproject includes tests for engine, apps/cli, apps/server, docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # This pulls LFS files automatically
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: "pip"
          cache-dependency-path: "poetry.lock"
      - name: Install dependencies
        env:
          POETRY_VIRTUALENVS_CREATE: "true"
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction --with dev
          pip install -e .
      - name: Cutover import audit (post-swap)
        run: |
          python scripts/audit_cutover_edges.py --mode post-swap --enforce --json-out tmp/cutover_audit_ci.json
      - name: Run tests
        env:
          PYTHONPATH: "engine/src:apps/cli/src:apps/rest/src"
        run: |
          poetry run pytest -W ignore::DeprecationWarning -W ignore::pytest.PytestCollectionWarning

  distribution-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # This pulls LFS files automatically

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: "pip"
          cache-dependency-path: "poetry.lock"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry build

      - name: Install from wheel
        run: |
          pip install "$(find dist -name '*.whl')[server,cli]"
#          pip install "dist/*.whl[server,cli]"

      - name: Test console scripts work
        run: |
          which tangl-cli
          which tangl-serve

      - name: Run distribution tests
        run: |
          pip install pytest
          pytest engine/tests/test_package_distribution.py -v -W ignore::DeprecationWarning -W ignore::pytest.PytestCollectionWarning
