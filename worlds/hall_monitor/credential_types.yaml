# School-owned credential catalog. Local item ids and names are world content;
# the compiler qualifies their singleton labels by world and catalog.

student_id_academic:
  name: Student ID
  origin_ids: [upper, lower, exchange]
  indication: academic
  document_kind: id
  requires_id: false

