# Authored credential catalogue for the checkpoint skin.

# Checkpoint-skin coordinates
# ---------------------------
# Intentions: travel, work, emigrate.
# Controlled items: weapon, drugs, secrets.
# Origins: local, foreign_east, foreign_west.
#
# Seals/signatures are skin syntax. IDs are issued by state offices; tickets by
# carriers; permits and waivers by the agency responsible for the indication.
#
# Dispositions are allow, deny, and arrest. A reskin may render those as admit,
# send back, and send to office without changing the compliance operation.

# Anonymous or short-lived credentials
# -------------------------------------

travel_ticket:
  name: Travel Ticket
  origin_ids: [local, foreign_east, foreign_west]
  valid_period: 0
  indication: travel
  issuer_group: carrier
  document_kind: document
  requires_id: false
  facets:
    - channel: choice
      facet_type: giver
      payload: request_document

asylum_permit:
  name: Asylum Permit
  origin_ids: [foreign_east, foreign_west]
  valid_period: 30
  indication: emigrate
  issuer_group: immigration
  document_kind: document
  requires_id: false
  facets:
    - channel: choice
      facet_type: giver
      payload: request_document

security_pass:
  name: Security Pass
  origin_ids: [local, foreign_east]
  valid_period: 0
