# Reference-only credential catalogue for the checkpoint skin.
#
# This file is deliberately not loaded by the current demo. The live world uses
# credential_gate/domain.py; a future catalogue loader should compile this kind
# of authored data into CredentialDefinition singletons through one canonical
# path. Its purpose today is side-by-side comparison with reskins such as Hall
# Monitor and Steam-Automata Chop Shop.

# Checkpoint-skin coordinates
# ---------------------------
# Intentions: travel, work, emigrate.
# Controlled items: weapon, drugs, secrets.
# Origins: local, foreign_east, foreign_west.
#
# Seals/signatures are skin syntax. IDs are issued by state offices; tickets by
# carriers; permits and waivers by the agency responsible for the indication.
#
# Dispositions are allow, deny, and arrest. A reskin may render those as admit,
# send back, and send to office without changing the compliance operation.

# Anonymous or short-lived credentials
# -------------------------------------

travel_ticket:
  name: Travel Ticket
  origin: [local, foreign_east, foreign_west]
  valid_period: 0
  indication: travel
  sealed_by: carrier
  req_id: false

asylum_permit:
  name: Asylum Permit
  origin: [foreign_east, foreign_west]
  valid_period: 30
  indication: emigrate
  sealed_by: immigration
  req_id: false

security_pass:
  name: Security Pass
  origin: [local, foreign_east]
  valid_period: 0
  indication: secrets
  sealed_by: security_office
  req_id: false

# Identified, longer-lived credentials
# ------------------------------------

travel_visa:
  name: Travel Visa
  origin: [foreign_east, foreign_west]
  valid_period: 100
  indication: travel
  sealed_by: immigration
  req_id: true

work_permit:
  name: Work Permit
  origin: [local, foreign_east, foreign_west]
  valid_period: 100
  indication: work
  sealed_by: labor_office
  req_id: true

emigration_permit:
  name: Emigration Permit
  origin: [local, foreign_east, foreign_west]
  valid_period: 1000
  indication: emigrate
  sealed_by: immigration
  req_id: true

weapon_permit:
  name: Weapon Permit
  origin: [local, foreign_east]
  valid_period: 100
  indication: weapon
  sealed_by: security_office
  req_id: true

medical_permit:
  name: Medical Permit
  origin: [local, foreign_east, foreign_west]
  valid_period: 100
  indication: drugs
  sealed_by: health_office
  req_id: true

diplomatic_id:
  name: Diplomatic Identification
  origin: [foreign_east, foreign_west]
  valid_period: 100
  indication: secrets
  sealed_by: diplomatic_office
  req_id: true
